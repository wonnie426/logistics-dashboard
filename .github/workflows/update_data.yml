name: Update Financial Data

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 23:00 UTC = 오전 8:00 KST
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Fetch DART data
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python .github/scripts/fetch_dart.py --api-key "$DART_API_KEY"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/financial_data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "data: auto-update financial data $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
