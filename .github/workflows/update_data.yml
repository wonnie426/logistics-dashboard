name: Update Financial Data

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 23:00 UTC = 오전 8:00 KST
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # DART API는 등록된 IP만 접근 가능 → VM cron에서 직접 실행 후 push
      # 이 워크플로우는 수동 트리거 시 상태만 확인
      - name: Check data freshness
        run: |
          if [ -f data/financial_data.json ]; then
            echo "financial_data.json exists"
            python3 -c "import json; d=json.load(open('data/financial_data.json')); print('updated_at:', d.get('updated_at','unknown'))"
          else
            echo "financial_data.json not found"
          fi
