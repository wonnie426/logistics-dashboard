  const header = ['항목', ...CODES.map(c => NAMES[c])];
  const metrics = [
    ['매출액 (억원)',    d => d?.pl?.revenue != null ? Math.round(d.pl.revenue/1e8) : null],
    ['영업이익 (억원)',  d => d?.pl?.operating_income != null ? Math.round(d.pl.operating_income/1e8) : null],
    ['영업이익률 (%)',   d => d?.ratios?.operating_margin],
    ['순이익률 (%)',     d => d?.ratios?.net_margin],
    ['ROE(지배) (%)',    d => d?.ratios?.roe],
    ['ROA (%)',          d => d?.ratios?.roa],
    ['부채비율 (%)',     d => d?.ratios?.debt_ratio],
    ['유동비율 (%)',     d => d?.ratios?.current_ratio],
    ['이자보상비율 (배)',d => d?.ratios?.interest_coverage],
    ['차입금의존도 (%)', d => d?.ratios?.borrowing_dependency],
  ];
  const rows1 = [header];
  metrics.forEach(([label, getter]) => {
    rows1.push([label, ...CODES.map(c => {
      const v = getter(getReportData(FIN.companies[c], selYear, fsDiv));
      return v != null ? +v.toFixed(2) : '—';
    })]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols'] = [{ wch:20 },{ wch:18 },{ wch:14 },{ wch:10 }];
  XLSX.utils.book_append_sheet(wb, ws1, `${selYear}${isQ?'':'년'} 비교`);

  CODES.forEach(code => {
    const hdr = [isQ?'분기':'연도','매출액(억)','영업이익(억)','영업이익률(%)','ROE(%)','부채비율(%)','유동비율(%)','이자보상비율(배)'];
    const yearRows = [hdr];
    YEARS.forEach(y => {
      const d = getReportData(FIN.companies[code], y, fsDiv);
      yearRows.push([
        y,
        d?.pl?.revenue != null ? Math.round(d.pl.revenue/1e8) : '—',
        d?.pl?.operating_income != null ? Math.round(d.pl.operating_income/1e8) : '—',
        d?.ratios?.operating_margin != null ? +d.ratios.operating_margin.toFixed(2) : '—',
        d?.ratios?.roe != null ? +d.ratios.roe.toFixed(2) : '—',
        d?.ratios?.debt_ratio != null ? +d.ratios.debt_ratio.toFixed(2) : '—',
        d?.ratios?.current_ratio != null ? +d.ratios.current_ratio.toFixed(2) : '—',
        d?.ratios?.interest_coverage != null ? +d.ratios.interest_coverage.toFixed(2) : '—',
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(yearRows);
    ws['!cols'] = [{ wch:8 },{ wch:12 },{ wch:14 },{ wch:14 },{ wch:10 },{ wch:12 },{ wch:10 },{ wch:14 }];
    XLSX.utils.book_append_sheet(wb, ws, NAMES[code]);
  });

  XLSX.writeFile(wb, `물류3사_재무비율_${selYear}_${fsDiv}.xlsx`);
}

function renderIrEsgTab() {
  const el = $('tab-iresg');
  if (!IRESG || !IRESG.companies) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-sub)">IR/ESG 자료를 불러오지 못했습니다.</div>';
    return;
  }
  const CODES = ['LGL','CJ','HJ','HGL'];

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function listBlock(title, block, color, extraBtn) {
    const src = block?.source_url || '';
    const items = block?.items || [];
    let rows;
    if (!items.length) {
      const note = block?.note || '자동 수집된 목록이 없습니다.';
      rows = `<div class="iresg-empty">${esc(note)}${extraBtn || ''}</div>`;
    } else {
      rows = `<ul class="iresg-list">` + items.map(it => {
        const link = it.url || src;
        const dt = it.date ? `<span class="iresg-date">${esc(it.date)}</span>` : '';
        return `<li><a href="${esc(link)}" target="_blank" rel="noopener">${esc(it.title)}</a>${dt}</li>`;
      }).join('') + `</ul>`;
    }
    return `
      <div class="iresg-col">
        <div class="iresg-col-head" style="border-color:${color}">
          <span>${title}</span>
          ${src ? `<a class="iresg-src" href="${esc(src)}" target="_blank" rel="noopener">사이트 바로가기 ↗</a>` : ''}
        </div>
        ${rows}
      </div>`;
  }

  const cards = CODES.map(code => {
    const co = IRESG.companies[code];
    if (!co) return '';
    const color = (FIN?.companies?.[code]?.color) || '#003087';
    return `
      <div class="card" style="margin-bottom:20px">
        <div class="card-title" style="color:${color}">${esc(co.name || code)}</div>
        <div class="iresg-grid">
          ${listBlock('ESG · 지속가능경영보고서', co.esg, color)}
          ${listBlock('IR 자료', co.ir, color, code === 'CJ'
            ? `<div style="margin-top:10px"><button class="dart-day-btn" onclick="switchTab('dart')">📑 공시자료 탭에서 보기</button></div>`
            : '')}
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div style="margin-bottom:12px;color:var(--text-sub);font-size:12px">
      각 사 홈페이지 IR/ESG 자료실에서 수집한 목록입니다. 항목 클릭 시 원본 페이지로 이동합니다.
      ${IRESG.updated_at ? ` · 수집일: ${esc(IRESG.updated_at)}` : ''}
    </div>
    ${cards}`;
}

// ── Excel 업로드로 segment_data.json 수정 ───────────────────────────────────

let _excelParsedRows = [];   // 파싱된 행 캐시

function openDataModal() {
  document.getElementById('data-modal-overlay').classList.add('open');
  _excelParsedRows = [];
  document.getElementById('upload-preview-wrap').innerHTML = '';
  document.getElementById('apply-excel-btn').style.display = 'none';
  document.getElementById('dl-json-btn').style.display = 'none';
  const inp = document.getElementById('excel-file-input');
  if (inp) inp.value = '';
}
function closeDataModal() {
  document.getElementById('data-modal-overlay').classList.remove('open');
}

// 템플릿 Excel 생성 — 현재 SEG 구조 기반
function downloadSegmentTemplate() {
  const wb = XLSX.utils.book_new();

  // 안내 시트
  const guide = [
    ['사업부문 실적 입력 양식'],
    [''],
    ['【작성 방법】'],
    ['1. "데이터입력" 시트에서 매출액(원), 영업이익(원) 열만 수정하세요.'],
    ['2. 기존 행을 수정하거나, 새 기간(2026Q2 등)을 추가할 수 있습니다.'],
    ['3. 금액 단위: 원 (억원 × 100,000,000)'],
    ['4. 영업손실은 음수로 입력 (예: -1500000000)'],
    ['5. 모르는 값은 비워두세요 (null 처리됨).'],
    ['6. 작성 후 이 사이트의 "데이터 관리 > Excel 업로드" 메뉴에서 파일을 올리세요.'],
    [''],
    ['기간 표기 형식:'],
    ['  연간보고서 → 2025, 2026 등'],
    ['  1분기     → 2026Q1'],
    ['  반기      → 2026Q2'],
    ['  3분기     → 2026Q3'],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(guide), '작성안내');

  // 데이터 입력 시트
  const header = ['회사코드','회사명','기간','재무제표','부문','매출액(원)','영업이익(원)','비고(자동생성)'];
  const rows = [header];

  if (SEG && SEG.companies) {
    Object.entries(SEG.companies).forEach(([code, co]) => {
      const coName = FIN?.companies?.[code]?.name || code;
      ['annual','quarterly'].forEach(pType => {
        const periods = co[pType] || {};
        Object.entries(periods).sort().forEach(([pKey, fsMap]) => {
          Object.entries(fsMap).forEach(([fs, entry]) => {
            if (typeof entry !== 'object' || Array.isArray(entry)) return;
            const segments = co.segments || [];
            segments.forEach(seg => {
              const d = entry[seg] || {};
              rows.push([
                code, coName, pKey, fs, seg,
                d.revenue ?? '', d.operating_income ?? '',
                d.note || ''
              ]);
            });
          });
        });
      });
    });
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [8,12,8,6,10,18,18,30].map(w => ({ wch: w }));
  // 헤더 행 고정
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };
  XLSX.utils.book_append_sheet(wb, ws, '데이터입력');

  XLSX.writeFile(wb, `사업부문_입력양식_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// Excel 파일 파싱
function handleSegmentExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      // "데이터입력" 시트 우선, 없으면 첫 번째 시트
      const sheetName = wb.SheetNames.includes('데이터입력') ? '데이터입력' : wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });

      // 컬럼명 유연하게 매핑
      const colAlias = (row, ...names) => {
        for (const n of names) {
          const k = Object.keys(row).find(k => k.replace(/\s/g,'').toLowerCase().includes(n.toLowerCase().replace(/\s/g,'')));
          if (k !== undefined && row[k] !== '') return row[k];
        }
        return null;
      };

      _excelParsedRows = raw.map(row => ({
        code:  String(colAlias(row, '회사코드', 'code') || '').trim().toUpperCase(),
        pKey:  String(colAlias(row, '기간', 'period', 'pKey') || '').trim(),
        fs:    String(colAlias(row, '재무제표', 'fs', 'FS') || 'CFS').trim().toUpperCase() || 'CFS',
        seg:   String(colAlias(row, '부문', 'segment', 'seg') || '').trim(),
        rev:   colAlias(row, '매출액', 'revenue') !== null ? Number(colAlias(row, '매출액', 'revenue')) : null,
        op:    colAlias(row, '영업이익', 'operating_income') !== null ? Number(colAlias(row, '영업이익', 'operating_income')) : null,
      })).filter(r => r.code && r.pKey && r.seg);

      renderExcelPreview(_excelParsedRows);
    } catch(err) {
      document.getElementById('upload-preview-wrap').innerHTML =
        `<p style="color:var(--red);font-size:13px">파일 파싱 오류: ${err.message}</p>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderExcelPreview(rows) {
  if (!rows.length) {
    document.getElementById('upload-preview-wrap').innerHTML =
      '<p style="color:var(--text-sub);font-size:13px">데이터 행이 없습니다.</p>';
    return;
  }
  let changed = 0;
  const trs = rows.map(r => {
    const existing = SEG?.companies?.[r.code]?.[r.pKey?.match(/Q/) ? 'quarterly' : 'annual']?.[r.pKey]?.[r.fs]?.[r.seg];
    const isNew = !existing;
    const revChanged = existing && existing.revenue !== r.rev && r.rev !== null;
    const opChanged  = existing && existing.operating_income !== r.op && r.op !== null;
    const rowClass   = isNew ? 'new-row' : (revChanged || opChanged) ? 'changed' : '';
    if (rowClass) changed++;
    const fmtNum = v => v === null || v === '' ? '—' : Number(v).toLocaleString('ko-KR');
    return `<tr class="${rowClass}">
      <td>${r.code}</td><td>${r.pKey}</td><td>${r.fs}</td><td>${r.seg}</td>
      <td style="text-align:right">${fmtNum(r.rev)}</td>
      <td style="text-align:right">${fmtNum(r.op)}</td>
    </tr>`;
  }).join('');

  document.getElementById('upload-preview-wrap').innerHTML = `
    <p style="font-size:12px;color:var(--text-sub);margin-bottom:6px">
      총 ${rows.length}행 — <span style="background:#dcfce7;padding:1px 5px;border-radius:3px">신규</span>
      <span style="background:#fef9c3;padding:1px 5px;border-radius:3px;margin-left:4px">변경</span>
      (변경/신규: ${changed}행)
    </p>
    <div class="upload-preview">
      <table><thead><tr>
        <th>회사</th><th>기간</th><th>FS</th><th>부문</th><th>매출액(원)</th><th>영업이익(원)</th>
      </tr></thead><tbody>${trs}</tbody></table>
    </div>`;

  document.getElementById('apply-excel-btn').style.display = 'inline-flex';
}

// 메모리에 반영 + 화면 새로고침 + JSON 다운로드 버튼 노출
function applySegmentExcel() {
  if (!_excelParsedRows.length) return;
  let count = 0;
  _excelParsedRows.forEach(r => {
    if (!SEG.companies[r.code]) return;
    const pType = r.pKey.match(/Q\d$/) ? 'quarterly' : 'annual';
    const co    = SEG.companies[r.code];
    co[pType]          = co[pType] || {};
    co[pType][r.pKey]  = co[pType][r.pKey] || {};
    const entry = co[pType][r.pKey];
    entry[r.fs]        = entry[r.fs] || {};
    const fsEntry = entry[r.fs];
    fsEntry[r.seg]     = fsEntry[r.seg] || {};
    if (r.rev !== null && !isNaN(r.rev)) { fsEntry[r.seg].revenue = r.rev; count++; }
    if (r.op  !== null && !isNaN(r.op))  { fsEntry[r.seg].operating_income = r.op; }
    if (!fsEntry[r.seg].note) fsEntry[r.seg].note = 'Excel 업로드로 입력';
    if (!fsEntry.source) fsEntry.source = `${r.pKey} (Excel 업로드 ${new Date().toISOString().slice(0,10)})`;
  });

  // 화면 새로고침
  if (activeTab && !['compare','report','dart','iresg'].includes(activeTab)) {
    renderCompanyTab(activeTab);
  }

  document.getElementById('apply-excel-btn').style.display = 'none';
  document.getElementById('dl-json-btn').style.display = 'inline-flex';
  document.getElementById('upload-preview-wrap').insertAdjacentHTML('afterbegin',
    `<p style="color:var(--green);font-weight:600;font-size:13px;margin-bottom:8px">
      ✅ ${count}개 항목 반영 완료. JSON 파일을 다운로드해서 저장소에 커밋하면 영구 저장됩니다.</p>`);
}

// 업데이트된 segment_data.json 다운로드
function downloadUpdatedSegmentJson() {
  const blob = new Blob([JSON.stringify(SEG, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'segment_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

loadData();
</script>

<div id="data-modal-overlay" class="data-modal-overlay" onclick="if(event.target===this)closeDataModal()">
  <div class="data-modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <h2>📊 데이터 관리</h2>
      <button onclick="closeDataModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-sub)">✕</button>
    </div>
    <p class="data-modal-sub">Excel로 사업부문 실적을 수정하고 업데이트된 JSON을 다운로드합니다.</p>

    <div class="data-modal-section">
      <h3>1단계 — 템플릿 다운로드</h3>
      <p style="font-size:12px;color:var(--text-sub);margin-bottom:10px">
        현재 데이터 기반 양식을 받아 매출액·영업이익 칸을 채워주세요.
      </p>
      <button class="btn-primary" onclick="downloadSegmentTemplate()">⬇ 양식 다운로드 (.xlsx)</button>
    </div>

    <div class="data-modal-section">
      <h3>2단계 — 작성 후 업로드</h3>
      <div class="upload-drop-zone" onclick="document.getElementById('excel-file-input').click()"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="event.preventDefault();this.classList.remove('drag-over');
                   const f=event.dataTransfer.files[0];
                   if(f){const inp=document.getElementById('excel-file-input');
                   const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;
                   handleSegmentExcelUpload({target:inp});}">
        <input type="file" id="excel-file-input" accept=".xlsx,.xls"
               onchange="handleSegmentExcelUpload(event)">
        <div style="font-size:24px;margin-bottom:6px">📂</div>
        <div>클릭하거나 파일을 드래그해서 업로드</div>
        <div style="font-size:11px;margin-top:4px">.xlsx / .xls 지원</div>
      </div>
      <div id="upload-preview-wrap"></div>
    </div>

    <div class="modal-actions">
      <button id="dl-json-btn" class="btn-primary" style="display:none;background:#16a34a"
              onclick="downloadUpdatedSegmentJson()">⬇ segment_data.json 다운로드</button>
      <button id="apply-excel-btn" class="btn-primary" style="display:none"
              onclick="applySegmentExcel()">✅ 화면에 반영하기</button>
      <button class="btn-secondary" onclick="closeDataModal()">닫기</button>
    </div>

    <div style="margin-top:14px;padding:10px;background:var(--bg);border-radius:6px;font-size:11px;color:var(--text-sub);line-height:1.6">
      💡 <strong>영구 저장 방법:</strong> 다운로드한 <code>segment_data.json</code>을
      <code>data/segment_data.json</code>으로 교체 후 GitHub에 커밋하면
      사이트에 영구 반영됩니다.
    </div>
  </div>
</div>
